---
# =============================================================================
# Ansible Role: OS Customize - Internal RedHat Variables
# =============================================================================
# Internal constants and computed values specific to RedHat-based systems.
# These values are NOT user-overridable. All use double-underscore prefix per Red Hat CoP.
#
# Sections:
#   1. Banner and Login Script Paths
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Banner and Login Script Paths
# -----------------------------------------------------------------------------
# Path to the login banner file on RedHat systems
__os_customize_welcome_banner_path: "/etc/profile.d/banner"

# Path to the login message script on RedHat systems
__os_customize_welcome_script_path: "/etc/profile.d/login.sh"
