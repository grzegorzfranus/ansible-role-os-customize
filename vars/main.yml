---
# =============================================================================
# Ansible Role: OS Customize - Internal Variables
# =============================================================================
# Internal constants and computed values shared across all distributions.
# These values are NOT user-overridable. All use double-underscore prefix per Red Hat CoP.
#
# Sections:
#   1. Bashrc Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Bashrc Configuration
# -----------------------------------------------------------------------------
# Marker used to identify Ansible-managed blocks in .bashrc files
__os_customize_bashrc_marker: "# BEGIN ANSIBLE MANAGED BLOCK"

# List of .bashrc files to manage by default
__os_customize_bashrc_list:
  - /root/.bashrc
  - /etc/skel/.bashrc
