---
# =============================================================================
# Ansible Role: OS Customize - Tasks: Configure
# =============================================================================
# These tasks handle the configuration of OS customization, including banner,
# login message, package installation, timezone setup, service management,
# and user group configuration.
#
# Flow:
# 1. Deploy login banner
# 2. Deploy login message script
# 3. Install additional packages (optional)
# 4. Configure system timezone (optional)
# 5. Disable motd-news.timer service (optional)
# 6. Create SSH users group (optional)
# 7. Configure APT periodic settings (optional)
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Deploy Login Banner
# -----------------------------------------------------------------------------
- name: "OS Customize | template | Deploy welcome banner"
  become: true
  ansible.builtin.template:
    src: "banner.j2"
    dest: "{{ __os_customize_welcome_banner_path }}"
    owner: root
    group: root
    mode: "0644"
    backup: true

# -----------------------------------------------------------------------------
# 2. Deploy Login Message Script
# -----------------------------------------------------------------------------
- name: "OS Customize | template | Deploy welcome message script"
  become: true
  ansible.builtin.template:
    src: "scripts/login_{{ ansible_facts['os_family'] | lower }}.sh.j2"
    dest: "{{ __os_customize_welcome_script_path }}"
    owner: root
    group: root
    mode: "0644"
    backup: true

# -----------------------------------------------------------------------------
# 3. Install Additional Packages (Optional)
# -----------------------------------------------------------------------------
- name: "OS Customize | package | Install additional packages"
  become: true
  ansible.builtin.package:
    name: "{{ os_customize_additional_packages }}"
    update_cache: true
    state: present
  when: >
    os_customize_configure_additional_packages | default(false) | bool

# -----------------------------------------------------------------------------
# 4. Configure System Timezone (Optional)
# -----------------------------------------------------------------------------
- name: "OS Customize | block | Configure system timezone"
  when: >
    os_customize_configure_timezone | default(false) | bool
  block:
    - name: "OS Customize | stat | Check if timezone is available"
      ansible.builtin.stat:
        path: "/usr/share/zoneinfo/{{ os_customize_timezone }}"
      register: __os_customize_timezone_file

    - name: "OS Customize | fail | Fail if timezone is not available"
      ansible.builtin.fail:
        msg: "The timezone {{ os_customize_timezone }} is not available on this system"
      when: >
        not __os_customize_timezone_file.stat.exists or
        __os_customize_timezone_file.stat.isdir

    - name: "OS Customize | timezone | Set system timezone"
      community.general.timezone:
        name: "{{ os_customize_timezone }}"
      register: __os_customize_timezone_changed
      become: true

    - name: "OS Customize | debug | Show timezone change notification"
      ansible.builtin.debug:
        msg: "Timezone changed to {{ os_customize_timezone }}"
      when: >
        __os_customize_timezone_changed.changed
      # noqa: no-handler

# -----------------------------------------------------------------------------
# 5. Disable MOTD News Service (Optional)
# -----------------------------------------------------------------------------
- name: "OS Customize | stat | Check if motd-news.timer exists"
  ansible.builtin.stat:
    path: "/lib/systemd/system/motd-news.timer"
  register: __os_customize_motd_news_timer
  become: true
  when: >
    os_customize_disable_motd_news | default(false) | bool

- name: "OS Customize | systemd | Disable and stop motd-news.timer"
  ansible.builtin.systemd:
    name: motd-news.timer
    state: stopped
    enabled: false
    masked: true
  when: >
    os_customize_disable_motd_news | default(false) | bool and
    __os_customize_motd_news_timer.stat.exists | default(false) | bool
  become: true

# -----------------------------------------------------------------------------
# 6. Create SSH Users Group (Optional)
# -----------------------------------------------------------------------------
- name: "OS Customize | group | Create dedicated SSH users group"
  ansible.builtin.group:
    name: "{{ os_customize_ssh_group_name }}"
    gid: "{{ os_customize_ssh_group_gid }}"
    state: present
    system: false
  when: >
    os_customize_configure_ssh_group | default(false) | bool
  become: true

# -----------------------------------------------------------------------------
# 7. Configure APT Periodic Settings (Optional)
# -----------------------------------------------------------------------------
- name: "OS Customize | block | Configure APT periodic settings"
  when:
    - ansible_facts['os_family'] | lower == 'debian'
    - os_customize_configure_apt_periodic | default(false) | bool
  become: true
  block:
    - name: "OS Customize | find | Locate existing APT configuration files"
      ansible.builtin.find:
        paths: "/etc/apt/apt.conf.d"
        file_type: file
      register: __os_customize_apt_conf_files

    - name: "OS Customize | replace | Update existing APT Periodic Update-Package-Lists directives"
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: '^\s*APT::Periodic::Update-Package-Lists\s+"[^"]*";'
        replace: 'APT::Periodic::Update-Package-Lists "{{ os_customize_apt_periodic_update_package_lists }}";'
      loop: "{{ __os_customize_apt_conf_files.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: "OS Customize | replace | Update existing APT Periodic Unattended-Upgrade directives"
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: '^\s*APT::Periodic::Unattended-Upgrade\s+"[^"]*";'
        replace: 'APT::Periodic::Unattended-Upgrade "{{ os_customize_apt_periodic_unattended_upgrade }}";'
      loop: "{{ __os_customize_apt_conf_files.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: "OS Customize | lineinfile | Enforce APT periodic settings in /etc/apt/apt.conf.d/20auto-upgrades"
      ansible.builtin.lineinfile:
        path: "/etc/apt/apt.conf.d/20auto-upgrades"
        regexp: '^\s*APT::Periodic::Update-Package-Lists'
        line: 'APT::Periodic::Update-Package-Lists "{{ os_customize_apt_periodic_update_package_lists }}";'
        create: true
        owner: root
        group: root
        mode: "0644"

    - name: "OS Customize | lineinfile | Enforce APT unattended upgrade in /etc/apt/apt.conf.d/20auto-upgrades"
      ansible.builtin.lineinfile:
        path: "/etc/apt/apt.conf.d/20auto-upgrades"
        regexp: '^\s*APT::Periodic::Unattended-Upgrade'
        line: 'APT::Periodic::Unattended-Upgrade "{{ os_customize_apt_periodic_unattended_upgrade }}";'
        create: true
        owner: root
        group: root
        mode: "0644"
